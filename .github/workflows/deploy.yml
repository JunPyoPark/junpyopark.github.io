name: Deploy to GitHub Pages

on:
  push:
    branches:
      - feature/web-desktop  # 이 브랜치에 푸시하면 배포 시작!

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: yarn install --ignore-engines
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Prebuild
        run: yarn build:prebuild
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Build
        run: yarn build
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # Next.js 빌드 결과물이 저장되는 폴더
          branch: master # 실제 웹사이트가 보일 곳
          clean: true